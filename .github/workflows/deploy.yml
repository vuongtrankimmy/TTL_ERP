name: TTL ERP - GitHub Pages Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy_to_github_pages:
    name: Build & Deploy Blazor WASM to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cleanup stale files (Fix Ghost Files)
      run: |
        find . -name "App_Home.razor.cs" -delete
        find . -name "App_Home.razor" -delete

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Install WASM Workload
      run: dotnet workload install wasm-tools

    - name: Restore dependencies
      run: dotnet restore TTL.HR/TTL.HR.Wasm/TTL.HR.Wasm.csproj

    - name: Publish Blazor WASM
      run: dotnet publish TTL.HR/TTL.HR.Wasm/TTL.HR.Wasm.csproj -c Release -o release --nologo

    - name: Change base-tag to repository name
      # This is required for custom domain erp.tantanloc.xo.je
      # We change any variation of <base href="..." /> to <base href="/" />
      run: |
        sed -i 's|<base href="[^"]*" />|<base href="/" />|g' release/wwwroot/index.html
        sed -i 's|<base href="[^"]*" />|<base href="/" />|g' release/wwwroot/404.html || true

    - name: Add .nojekyll
      # Prevents GitHub from ignoring files starting with underscores (like Blazor's _framework)
      run: touch release/wwwroot/.nojekyll

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: release/wwwroot
        clean: true
