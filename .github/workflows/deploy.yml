name: TTL ERP - GitHub Pages Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy_to_github_pages:
    name: Build & Deploy Blazor WASM to GitHub Pages
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Install WASM Workload
      run: dotnet workload install wasm-tools

    - name: Restore dependencies
      run: dotnet restore TTL.HR/TTL.HR.Wasm/TTL.HR.Wasm.csproj

    - name: Publish Blazor WASM
      run: dotnet publish TTL.HR/TTL.HR.Wasm/TTL.HR.Wasm.csproj -c Release -o release --nologo

    - name: Change base-tag to repository name
      # This is required for GitHub Pages subfolder hosting
      # We change <base href="/" /> to <base href="/TTL_ERP/" />
      run: |
        $path = "release/wwwroot/index.html"
        $content = Get-Content $path
        $content = $content -replace '<base href="/" />', '<base href="/TTL_ERP/" />'
        $content | Set-Content $path
      shell: powershell

    - name: Add .nojekyll
      # Prevents GitHub from ignoring files starting with underscores (like Blazor's _framework)
      run: New-Item -ItemType File -Path "release/wwwroot/.nojekyll" -Force

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: release/wwwroot
        clean: true
