<!DOCTYPE html>
<html lang="en">

<head data-bs-theme="light">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTL HR - ERP System</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
    <link href="_content/TTL.HR.Shared/assets/plugins/custom/fullcalendar/fullcalendar.bundle.css" rel="stylesheet" type="text/css" />
    <link href="_content/TTL.HR.Shared/assets/plugins/custom/datatables/datatables.bundle.css" rel="stylesheet" type="text/css" />
    <link href="_content/TTL.HR.Shared/assets/plugins/global/plugins.bundle.css" rel="stylesheet" type="text/css" />
    <link href="_content/TTL.HR.Shared/assets/css/style.bundle.css" rel="stylesheet" type="text/css" />
    <link href="_content/TTL.HR.Shared/css/custom-improvements.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="_content/TTL.HR.Shared/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png" />
    <base href="/" />
</head>

<body id="kt_app_body" data-kt-app-header-fixed="true" data-kt-app-header-fixed-mobile="true" data-kt-app-sidebar-enabled="true" data-kt-app-sidebar-fixed="true" data-kt-app-sidebar-push-header="true" data-kt-app-sidebar-push-toolbar="true" data-kt-app-sidebar-push-footer="true" class="app-default">
    <div id="app">
        <!-- Loading state -->
        <style>
            .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif; background: #f9f9f9; }
            .spinner { width: 50px; height: 50px; border: 5px solid #e0e0e0; border-top: 5px solid #3E97FF; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            .loading-text { font-size: 1.2rem; color: #5E6278; font-weight: 500; }
        </style>
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text">Loading TTL ERP...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_content/TTL.HR.Shared/assets/plugins/global/plugins.bundle.js"></script>
    <script type="text/javascript">
        // SPA Redirect Logic for GitHub Pages
        (function(l) {
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function(v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (l.hash || '')
                    );
                }
            }
        }(window.location))
    </script>
    <script src="_content/TTL.HR.Shared/assets/js/scripts.bundle.js"></script>
    <script src="_content/TTL.HR.Shared/assets/js/layout-helper.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Metronic + ApexCharts conflict fix
        if (window.SVG) { window._MetronicSVG = window.SVG; window.SVG = undefined; }
    </script>
</body>

</html>
