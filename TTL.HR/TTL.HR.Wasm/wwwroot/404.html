<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TTL HR Redirect</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // This script runs on every path, redirects back to index.html
        var l = window.location;
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/?p=' + l.pathname.replace(/&/g, '~and~').slice(1) +
            l.search.replace(/&/g, '~and~') + l.hash);
    </script>
</head>
<body>
</body>
</html>
